<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last opp – autoutfylt – Bildebanken</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
</head>
<body>
  <!-- Toppbar -->
  <header class="topbar">
    <a href="index.html" class="logo">
      <span class="logo-mark">
        <img src="Assets/NRKlogo-Core-Gray-950.webp" alt="NRK" />
      </span>
      Bildebanken
    </a>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Bytt mellom lyst og mørkt tema" title="Bytt tema">
        <span class="theme-ic theme-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
        <span class="theme-ic theme-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
      </button>
      <a href="last-opp.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Last opp
      </a>
      <span class="user-chip">
        <span class="avatar">KD</span>
        Hei, Kaja van Domburg
      </span>
    </div>
  </header>

  <main class="page">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Tilbake til oversikt
    </a>

    <div class="upload-grid">
      <!-- Venstre: opplastet bilde -->
      <section class="panel">
        <div class="media-preview">
          <div class="media-thumb">
            <span class="source-badge">ADOBE STOCK</span>
            <img src="Assets/K83Y1iTxWpqkzrPEq3XOigUQHZ1o1wRWf2-6cj6-jMvg.jpg" alt="Opplastet bilde" />
          </div>
          <div class="media-meta">
            <p class="media-title">Tittel på bilde_foto-fotografnavn_090426</p>
            <div class="media-specs">
              <span>3500x2800px</span>
              <span>PNG</span>
              <span>12,5 MB</span>
            </div>
          </div>
          <div class="tags">
            <span class="tag">Nyheter</span>
            <span class="tag">Sport</span>
            <span class="tag">VM 2026</span>
            <span class="tag">Sommer</span>
            <span class="tag">Spania</span>
          </div>
        </div>
      </section>

      <!-- Høyre: autoutfylt skjema -->
      <section class="panel">
        <div class="form-head">
          <h2>Føring av metadata</h2>
          <p>Vi har allerede fylt ut en del av punktene for deg, så du kan fokusere på det viktigste.</p>
          <div class="stepper">
            <span class="step is-active">1</span>
            <span class="step-line"></span>
            <span class="step">2</span>
            <span class="step-line"></span>
            <span class="step">3</span>
          </div>
        </div>

        <form id="upload-form">
          <div class="field">
            <label>
              Tittel <span class="req">*</span>
              <span class="auto-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                Fylt ut automatisk
              </span>
            </label>
            <input class="input is-auto" type="text" value="Tittel kommer automatisk_tittel_auto_213226" />
          </div>

          <div class="field">
            <label>
              Fotograf <span class="req">*</span>
              <span class="auto-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                Fylt ut automatisk
              </span>
            </label>
            <input class="input is-auto" type="text" value="Navn på fotograf kommer automatisk her" />
          </div>

          <div class="field">
            <label>
              Kilde <span class="req">*</span>
              <span class="auto-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                Fylt ut automatisk
              </span>
            </label>
            <select class="select is-auto">
              <option>NRK sine bilder</option>
              <option>NTB</option>
              <option selected>Adobe Stock</option>
              <option>Dine opplastinger</option>
            </select>
          </div>

          <div class="field-row">
            <div class="field">
              <label>
                Dato <span class="req">*</span>
                <span class="auto-hint">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                  Auto
                </span>
              </label>
              <input class="input is-auto" type="text" value="21.03.2026" />
            </div>
            <div class="field">
              <label>
                Tid <span class="req">*</span>
                <span class="auto-hint">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                  Auto
                </span>
              </label>
              <input class="input is-auto" type="text" value="kl. 23:35" />
            </div>
          </div>

          <div class="field">
            <label>Gi bildet en status <span class="req">*</span></label>
            <select class="select" id="status-select" required>
              <option value="" selected disabled>Velg status</option>
              <option>Godkjent for bruk</option>
              <option>Begrenset bruk</option>
              <option>Ikke klarert</option>
              <option>Tidsbegrenset</option>
            </select>
          </div>

          <div class="field">
            <label>Forklaring</label>
            <textarea class="textarea" placeholder="Legg inn forklaring her"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Gå videre</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <div class="toast" id="toast">
    <span class="toast-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </span>
    <span id="toast-msg"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
